---
# Post-deploy verification for HomeCoin on Azure Container Apps.
# Run after Terraform apply; vars come from Terraform outputs (generate_ansible_vars.py).

- name: Verify HomeCoin on Azure Container Apps
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    resource_group: "{{ lookup('env', 'AZURE_RESOURCE_GROUP') }}"
    api_app: "{{ container_app_name | default('homecoin-api') }}"
    worker_app: "{{ worker_app_name | default('homecoin-worker') }}"

  tasks:
    - name: Require AZURE_RESOURCE_GROUP
      ansible.builtin.assert:
        that:
          - resource_group | length > 0
        fail_msg: "Set AZURE_RESOURCE_GROUP."

    - name: Require API FQDN from Terraform outputs
      ansible.builtin.assert:
        that:
          - container_app_fqdn is defined
          - container_app_fqdn | length > 0
        fail_msg: "container_app_fqdn missing — run Terraform apply with deploy_apps=true first."

    - name: Show deployment targets
      ansible.builtin.debug:
        msg:
          - "API:  https://{{ container_app_fqdn }}/"
          - "Worker (internal): {{ worker_app_fqdn | default('n/a') }}"

    - name: Wait for API Container App to be running
      ansible.builtin.command:
        cmd: >-
          az containerapp show -g "{{ resource_group }}" -n "{{ api_app }}"
          --query properties.runningStatus -o tsv
      register: api_running
      until: api_running.stdout | trim == "Running"
      retries: 24
      delay: 10
      changed_when: false
      failed_when: false

    - name: Health check (HTTPS)
      ansible.builtin.uri:
        url: "https://{{ container_app_fqdn }}/health"
        return_content: true
        status_code: 200
      register: health
      retries: 36
      delay: 10
      until: health.content is search('ok')
      failed_when: false

    - name: Show API logs on health check failure
      ansible.builtin.command:
        cmd: az containerapp logs show -g "{{ resource_group }}" -n "{{ api_app }}" --tail 30
      when: health.content is not search('ok')
      changed_when: false
      failed_when: false

    - name: Show Worker logs on health check failure
      ansible.builtin.command:
        cmd: az containerapp logs show -g "{{ resource_group }}" -n "{{ worker_app }}" --tail 15
      when: health.content is not search('ok')
      changed_when: false
      failed_when: false

    - name: Fail when health check did not pass
      ansible.builtin.fail:
        msg: >-
          Health check failed for https://{{ container_app_fqdn }}/health.
          Verify POSTGRES_ADMIN_PASSWORD matches the PostgreSQL server password.
      when: health.content is not search('ok')

    - name: Deployment summary
      ansible.builtin.debug:
        msg: "HomeCoin is running at https://{{ container_app_fqdn }}/"
