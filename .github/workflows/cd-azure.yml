# Deploy HomeCoin microservices (API + Worker) to Azure Container Apps.
#
# Flow: build images → Terraform (Container Apps) → Ansible (verify)
#
# Repository variables:
#   AZURE_RESOURCE_GROUP (required)
#   AZURE_ACR_NAME (optional — auto-discovered from RG)
#
# Repository secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   POSTGRES_ADMIN_PASSWORD, JWT_SECRET, SUPERKIT_SECRET, WORKER_INTERNAL_TOKEN

name: CD — Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag (defaults to commit SHA)
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build and deploy microservices
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image tag
        id: meta
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Restore Terraform state
        uses: actions/cache/restore@v4
        with:
          path: infra/terraform/homecoin/terraform.tfstate
          key: terraform-state-v3-${{ vars.AZURE_RESOURCE_GROUP }}

      - name: Verify Terraform state exists
        run: |
          if [ ! -f infra/terraform/homecoin/terraform.tfstate ]; then
            echo "::error::No Terraform state found. Run **Azure Infrastructure** workflow first."
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Resolve ACR
        id: azure
        run: |
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          if [ -z "$RG" ]; then
            echo "::error::Set GitHub variable AZURE_RESOURCE_GROUP."
            exit 1
          fi
          if ! az group show --name "$RG" &>/dev/null; then
            echo "::error::Resource group '$RG' not found. Run **Azure Infrastructure** first."
            exit 1
          fi

          ACR=$(az acr list -g "$RG" --query "sort_by([].name, &@) | [0]" -o tsv)
          if [ -z "$ACR" ] || [ "$ACR" = "null" ]; then
            echo "::error::No Container Registry in '$RG'. Run **Azure Infrastructure** first."
            exit 1
          fi

          if [ -n "${{ vars.AZURE_ACR_NAME }}" ]; then
            if az acr show -n "${{ vars.AZURE_ACR_NAME }}" -g "$RG" &>/dev/null; then
              ACR="${{ vars.AZURE_ACR_NAME }}"
            else
              echo "::warning::AZURE_ACR_NAME '${{ vars.AZURE_ACR_NAME }}' not in $RG — using '$ACR'."
            fi
          fi

          echo "acr_name=$ACR" >> "$GITHUB_OUTPUT"
          echo "Using ACR=$ACR in $RG"

      - name: Login to ACR
        run: az acr login --name "${{ steps.azure.outputs.acr_name }}"

      - name: Build and push API image
        run: |
          ACR_LOGIN=$(az acr show --name "${{ steps.azure.outputs.acr_name }}" --query loginServer -o tsv)
          TAG="${{ steps.meta.outputs.tag }}"
          docker build --target api \
            -t "${ACR_LOGIN}/homecoin-api:${TAG}" \
            -t "${ACR_LOGIN}/homecoin-api:latest" .
          docker push "${ACR_LOGIN}/homecoin-api:${TAG}"
          docker push "${ACR_LOGIN}/homecoin-api:latest"

      - name: Build and push Worker image
        run: |
          ACR_LOGIN=$(az acr show --name "${{ steps.azure.outputs.acr_name }}" --query loginServer -o tsv)
          TAG="${{ steps.meta.outputs.tag }}"
          docker build --target worker \
            -t "${ACR_LOGIN}/homecoin-worker:${TAG}" \
            -t "${ACR_LOGIN}/homecoin-worker:latest" .
          docker push "${ACR_LOGIN}/homecoin-worker:${TAG}"
          docker push "${ACR_LOGIN}/homecoin-worker:latest"

      - name: Terraform apply (Container Apps)
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_superkit_secret: ${{ secrets.SUPERKIT_SECRET }}
          TF_VAR_worker_internal_token: ${{ secrets.WORKER_INTERNAL_TOKEN }}
        run: |
          chmod +x infra/scripts/terraform-apply-apps.sh
          ./infra/scripts/terraform-apply-apps.sh

      - name: Setup Ansible
        run: pip install ansible

      - name: Generate Ansible vars from Terraform outputs
        run: |
          python3 infra/scripts/generate_ansible_vars.py \
            infra/terraform/homecoin/deployment-outputs.json \
            > infra/ansible/group_vars/all/terraform.yml

      - name: Verify deployment (Ansible)
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          ANSIBLE_CONFIG=infra/ansible/ansible.cfg \
          ansible-playbook -i infra/ansible/inventory/localhost.ini \
            infra/ansible/playbooks/homecoin.yml

      - name: Save Terraform state
        if: success()
        uses: actions/cache/save@v4
        with:
          path: infra/terraform/homecoin/terraform.tfstate
          key: terraform-state-v3-${{ vars.AZURE_RESOURCE_GROUP }}

      - name: Summary
        if: success()
        run: |
          FQDN=$(jq -r '.container_app_fqdn.value' infra/terraform/homecoin/deployment-outputs.json)
          {
            echo "### HomeCoin deployed"
            echo ""
            echo "URL: https://${FQDN}/"
            echo "Health: https://${FQDN}/health"
          } >> "$GITHUB_STEP_SUMMARY"
