# Provision all Azure platform resources for HomeCoin (Terraform).
#
# Creates: resource group, ACR, PostgreSQL, Log Analytics, Container Apps Environment.
# Container Apps (API + Worker) are deployed by CD — Azure after images are in ACR.
#
# After `az group delete`, run with fresh_start=true.
#
# Secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID, POSTGRES_ADMIN_PASSWORD
# Variables: AZURE_RESOURCE_GROUP, AZURE_LOCATION

name: Azure Infrastructure

on:
  workflow_dispatch:
    inputs:
      fresh_start:
        description: Clear Terraform state (required after az group delete)
        required: false
        default: true
        type: boolean
      app_name:
        description: Resource name prefix
        required: false
        default: homecoin
        type: string
      min_replicas:
        description: Container App minimum replicas (used later by CD)
        required: false
        default: "1"
        type: string
      max_replicas:
        description: Container App maximum replicas (used later by CD)
        required: false
        default: "2"
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Terraform
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Clear Terraform state (fresh start)
        if: inputs.fresh_start
        run: rm -f infra/terraform/homecoin/terraform.tfstate*

      - name: Restore Terraform state
        if: ${{ !inputs.fresh_start }}
        uses: actions/cache/restore@v4
        with:
          path: infra/terraform/homecoin/terraform.tfstate
          key: terraform-state-v3-${{ vars.AZURE_RESOURCE_GROUP }}

      - name: Ensure resource group exists
        run: |
          echo "Region: ${{ vars.AZURE_LOCATION }}"
          az group create \
            --name "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --location "${{ vars.AZURE_LOCATION }}" \
            --output none

      - name: Verify Azure resource providers
        run: |
          for ns in Microsoft.App Microsoft.ContainerRegistry Microsoft.DBforPostgreSQL Microsoft.OperationalInsights; do
            state=$(az provider show --namespace "$ns" --query registrationState -o tsv 2>/dev/null || echo "Unknown")
            echo "$ns: $state"
            if [ "$state" = "Registering" ]; then
              echo "Waiting for $ns to finish registering..."
              for i in $(seq 1 20); do
                sleep 30
                state=$(az provider show --namespace "$ns" --query registrationState -o tsv)
                echo "$ns: $state"
                [ "$state" = "Registered" ] && break
              done
            fi
            if [ "$state" != "Registered" ]; then
              echo "::error::$ns is not Registered. Run locally: ./infra/bootstrap/register-providers.sh"
              exit 1
            fi
          done
          echo "All required providers are Registered."

      - name: Terraform init
        working-directory: infra/terraform/homecoin
        run: terraform init -input=false

      - name: Terraform apply (full platform)
        id: deploy
        working-directory: infra/terraform/homecoin
        env:
          TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          RG_LOCATION=$(az group show --name "${{ vars.AZURE_RESOURCE_GROUP }}" --query location -o tsv)

          terraform apply -auto-approve -input=false \
            -var="app_name=${{ inputs.app_name }}" \
            -var="resource_group_name=${{ vars.AZURE_RESOURCE_GROUP }}" \
            -var="location=$RG_LOCATION" \
            -var="deploy_apps=false" \
            -var="min_replicas=${{ inputs.min_replicas }}" \
            -var="max_replicas=${{ inputs.max_replicas }}"

          terraform output -json > deployment-outputs.json

      - name: Save Terraform state
        uses: actions/cache/save@v4
        with:
          path: infra/terraform/homecoin/terraform.tfstate
          key: terraform-state-v3-${{ vars.AZURE_RESOURCE_GROUP }}

      - name: Export outputs
        id: outputs
        run: |
          echo "acr_name=$(jq -r '.acr_name.value' infra/terraform/homecoin/deployment-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "container_env=$(jq -r '.container_env_name.value' infra/terraform/homecoin/deployment-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "postgres_server=$(jq -r '.postgres_server_name.value' infra/terraform/homecoin/deployment-outputs.json)" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          {
            echo "### Azure platform ready (Terraform)"
            echo ""
            echo "| Resource | Value |"
            echo "|----------|-------|"
            echo "| Resource group | \`${{ vars.AZURE_RESOURCE_GROUP }}\` |"
            echo "| ACR | \`${{ steps.outputs.outputs.acr_name }}\` |"
            echo "| Container Apps Environment | \`${{ steps.outputs.outputs.container_env }}\` |"
            echo "| PostgreSQL | \`${{ steps.outputs.outputs.postgres_server }}\` |"
            echo ""
            echo "**Next:** push to \`main\` or run **CD — Azure** to build images and deploy the app."
          } >> "$GITHUB_STEP_SUMMARY"
