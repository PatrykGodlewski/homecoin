# Provision Azure infrastructure for HomeCoin (Terraform).
#
# Run once per environment (or when infra changes), then use cd-azure.yml for app releases.
#
# Required repository secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   POSTGRES_ADMIN_PASSWORD  (min 8 chars, mixed case + numbers)
#
# Required repository variables:
#   AZURE_RESOURCE_GROUP
#   AZURE_LOCATION           e.g. uaenorth

name: Azure Infrastructure

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: Resource name prefix
        required: false
        default: homecoin
        type: string
      min_replicas:
        description: Container App minimum replicas (0 allows scale-to-zero)
        required: false
        default: "0"
        type: string
      max_replicas:
        description: Container App maximum replicas
        required: false
        default: "2"
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Terraform
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Ensure resource group exists
        run: |
          echo "Deploying to region: ${{ vars.AZURE_LOCATION }}"
          az group create \
            --name "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --location "${{ vars.AZURE_LOCATION }}" \
            --output none

      - name: Verify Azure resource providers
        run: |
          for ns in Microsoft.App Microsoft.ContainerRegistry Microsoft.DBforPostgreSQL Microsoft.OperationalInsights; do
            state=$(az provider show --namespace "$ns" --query registrationState -o tsv 2>/dev/null || echo "Unknown")
            echo "$ns: $state"
            if [ "$state" = "Registering" ]; then
              echo "Waiting for $ns to finish registering..."
              for i in $(seq 1 20); do
                sleep 30
                state=$(az provider show --namespace "$ns" --query registrationState -o tsv)
                echo "$ns: $state"
                [ "$state" = "Registered" ] && break
              done
            fi
            if [ "$state" != "Registered" ]; then
              echo "::error::$ns is not Registered. Run locally: ./infra/azure/register-providers.sh"
              exit 1
            fi
          done
          echo "All required providers are Registered."

      - name: Terraform init
        working-directory: infra/terraform/homecoin
        run: terraform init -input=false

      - name: Terraform apply (base infra)
        id: deploy
        working-directory: infra/terraform/homecoin
        env:
          TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          RG_LOCATION=$(az group show --name "${{ vars.AZURE_RESOURCE_GROUP }}" --query location -o tsv)
          echo "Resource group location: $RG_LOCATION"

          terraform apply -auto-approve -input=false \
            -var="app_name=${{ inputs.app_name }}" \
            -var="resource_group_name=${{ vars.AZURE_RESOURCE_GROUP }}" \
            -var="location=$RG_LOCATION" \
            -var="deploy_apps=false" \
            -var="min_replicas=${{ inputs.min_replicas }}" \
            -var="max_replicas=${{ inputs.max_replicas }}"

          terraform output -json > ../../../deployment-outputs.json

      - name: Export outputs
        id: outputs
        run: |
          echo "acr_name=$(jq -r '.acr_name.value' deployment-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "container_app=$(jq -r '.container_app_name.value' deployment-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "worker_app=$(jq -r '.worker_app_name.value' deployment-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "container_env=$(jq -r '.container_env_name.value' deployment-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "postgres_server=$(jq -r '.postgres_server_name.value' deployment-outputs.json)" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          {
            echo "### Azure infrastructure deployed (Terraform)"
            echo ""
            echo "| Setting | Value |"
            echo "|---------|-------|"
            echo "| Resource group | \`${{ vars.AZURE_RESOURCE_GROUP }}\` |"
            echo "| ACR name | \`${{ steps.outputs.outputs.acr_name }}\` |"
            echo "| Container Apps Environment | \`${{ steps.outputs.outputs.container_env }}\` |"
            echo "| API app name (for CD) | \`${{ steps.outputs.outputs.container_app }}\` |"
            echo "| Worker app name (for CD) | \`${{ steps.outputs.outputs.worker_app }}\` |"
            echo ""
            echo "Set variables \`AZURE_ACR_NAME\`, \`AZURE_CONTAINER_APP\`, \`AZURE_WORKER_APP\`, then run **CD — Azure** to deploy apps."
          } >> "$GITHUB_STEP_SUMMARY"
