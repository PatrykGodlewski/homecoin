# Deploy HomeCoin microservices (API + Worker) to Azure Container Apps.
#
# 1. Builds images in ACR
# 2. Deploys Container Apps via apps.bicep (real images, no placeholder)
#
# Repository variables:
#   AZURE_RESOURCE_GROUP, AZURE_ACR_NAME, AZURE_CONTAINER_APP, AZURE_WORKER_APP
#
# Repository secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   POSTGRES_ADMIN_PASSWORD, JWT_SECRET, SUPERKIT_SECRET, WORKER_INTERNAL_TOKEN

name: CD — Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag (defaults to commit SHA)
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build and deploy microservices
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image tag
        id: meta
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        run: az acr login --name "${{ vars.AZURE_ACR_NAME }}"

      - name: Build and push API image
        run: |
          ACR_LOGIN=$(az acr show --name "${{ vars.AZURE_ACR_NAME }}" --query loginServer -o tsv)
          TAG="${{ steps.meta.outputs.tag }}"
          docker build --target api \
            -t "${ACR_LOGIN}/homecoin-api:${TAG}" \
            -t "${ACR_LOGIN}/homecoin-api:latest" .
          docker push "${ACR_LOGIN}/homecoin-api:${TAG}"
          docker push "${ACR_LOGIN}/homecoin-api:latest"

      - name: Build and push Worker image
        run: |
          ACR_LOGIN=$(az acr show --name "${{ vars.AZURE_ACR_NAME }}" --query loginServer -o tsv)
          TAG="${{ steps.meta.outputs.tag }}"
          docker build --target worker \
            -t "${ACR_LOGIN}/homecoin-worker:${TAG}" \
            -t "${ACR_LOGIN}/homecoin-worker:latest" .
          docker push "${ACR_LOGIN}/homecoin-worker:${TAG}"
          docker push "${ACR_LOGIN}/homecoin-worker:latest"

      - name: Remove failed Container Apps (if any)
        run: |
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          for app in "${{ vars.AZURE_WORKER_APP }}" "${{ vars.AZURE_CONTAINER_APP }}"; do
            if az containerapp show -g "$RG" -n "$app" &>/dev/null; then
              state=$(az containerapp show -g "$RG" -n "$app" --query properties.provisioningState -o tsv)
              echo "$app: $state"
              if [ "$state" = "Failed" ]; then
                echo "Deleting failed app $app ..."
                az containerapp delete -g "$RG" -n "$app" --yes
              fi
            else
              echo "$app: not found (will be created)"
            fi
          done

      - name: Wait for ACR image propagation
        run: sleep 45

      - name: Deploy Container Apps (Bicep)
        id: apps
        run: |
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          ACR="${{ vars.AZURE_ACR_NAME }}"
          RG_LOCATION=$(az group show --name "$RG" --query location -o tsv)
          CONTAINER_ENV=$(az containerapp env list -g "$RG" --query "[?starts_with(name, 'homecoin')].name | [0]" -o tsv)
          POSTGRES_SERVER=$(az postgres flexible-server list -g "$RG" --query "[?starts_with(name, 'homecoin')].name | [0]" -o tsv)

          echo "Container env: $CONTAINER_ENV"
          echo "PostgreSQL: $POSTGRES_SERVER"

          # Enable ACR admin user for image pull (avoids AcrPull RBAC issues on student subscriptions)
          az acr update -n "$ACR" --admin-enabled true --output none
          ACR_USER=$(az acr credential show -n "$ACR" --query username -o tsv)
          ACR_PASS=$(az acr credential show -n "$ACR" --query "passwords[0].value" -o tsv)

          az deployment group create \
            --resource-group "$RG" \
            --name "homecoin-apps-$(date +%Y%m%d%H%M%S)" \
            --template-file infra/azure/apps.bicep \
            --parameters \
              acrName="$ACR" \
              containerEnvName="$CONTAINER_ENV" \
              postgresServerName="$POSTGRES_SERVER" \
              location="$RG_LOCATION" \
              postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
              jwtSecret="${{ secrets.JWT_SECRET }}" \
              superkitSecret="${{ secrets.SUPERKIT_SECRET }}" \
              workerInternalToken="${{ secrets.WORKER_INTERNAL_TOKEN }}" \
              acrUsername="$ACR_USER" \
              acrPassword="$ACR_PASS" \
              imageTag="${{ steps.meta.outputs.tag }}" \
            --query properties.outputs \
            --output json > apps-outputs.json

          echo "fqdn=$(jq -r '.containerAppFqdn.value' apps-outputs.json)" >> "$GITHUB_OUTPUT"

      - name: Health check (HTTPS)
        if: success()
        run: |
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          FQDN="${{ steps.apps.outputs.fqdn }}"

          echo "Public URL: https://${FQDN}/"
          echo "Waiting for https://${FQDN}/health ..."

          for i in $(seq 1 36); do
            RUNNING=$(az containerapp show -g "$RG" -n homecoin-api --query properties.runningStatus -o tsv 2>/dev/null || echo "Unknown")
            REPLICAS=$(az containerapp replica list -g "$RG" -n homecoin-api --query "length(@)" -o tsv 2>/dev/null || echo "0")
            echo "[$i/36] running=$RUNNING replicas=$REPLICAS"

            if curl -sf --max-time 10 "https://${FQDN}/health" 2>/dev/null | grep -q ok; then
              echo "Deployment healthy."
              exit 0
            fi

            if [ "$RUNNING" = "NotRunning" ] || [ "$REPLICAS" = "0" ]; then
              echo "--- API logs (app may be crashing) ---"
              az containerapp logs show -g "$RG" -n homecoin-api --tail 20 2>/dev/null || true
              echo "--- Worker logs ---"
              az containerapp logs show -g "$RG" -n homecoin-worker --tail 10 2>/dev/null || true
            fi

            sleep 10
          done

          echo "::error::Health check failed. Common fix: POSTGRES_ADMIN_PASSWORD in GitHub secrets must match the PostgreSQL server password."
          echo "--- Final API logs ---"
          az containerapp logs show -g "$RG" -n homecoin-api --tail 50 || true
          curl -v --max-time 15 "https://${FQDN}/health" || true
          exit 1
