# Deploy HomeCoin microservices (API + Worker) to Azure Container Apps.
#
# 1. Builds images in ACR
# 2. Deploys Container Apps via apps.bicep (real images, no placeholder)
#
# Repository variables:
#   AZURE_RESOURCE_GROUP, AZURE_ACR_NAME, AZURE_CONTAINER_APP, AZURE_WORKER_APP
#
# Repository secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   POSTGRES_ADMIN_PASSWORD, JWT_SECRET, SUPERKIT_SECRET, WORKER_INTERNAL_TOKEN

name: CD — Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag (defaults to commit SHA)
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build and deploy microservices
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image tag
        id: meta
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push API image
        run: |
          az acr build \
            --registry "${{ vars.AZURE_ACR_NAME }}" \
            --image "homecoin-api:${{ steps.meta.outputs.tag }}" \
            --image "homecoin-api:latest" \
            --target api \
            --file Dockerfile \
            .

      - name: Build and push Worker image
        run: |
          az acr build \
            --registry "${{ vars.AZURE_ACR_NAME }}" \
            --image "homecoin-worker:${{ steps.meta.outputs.tag }}" \
            --image "homecoin-worker:latest" \
            --target worker \
            --file Dockerfile \
            .

      - name: Remove failed placeholder apps (if any)
        run: |
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          for app in "${{ vars.AZURE_WORKER_APP }}" "${{ vars.AZURE_CONTAINER_APP }}"; do
            state=$(az containerapp show -g "$RG" -n "$app" --query properties.provisioningState -o tsv 2>/dev/null || echo "Missing")
            echo "$app: $state"
            if [ "$state" = "Failed" ]; then
              echo "Deleting failed app $app ..."
              az containerapp delete -g "$RG" -n "$app" --yes
            fi
          done

      - name: Deploy Container Apps (Bicep)
        id: apps
        run: |
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          RG_LOCATION=$(az group show --name "$RG" --query location -o tsv)
          CONTAINER_ENV=$(az containerapp env list -g "$RG" --query "[?starts_with(name, 'homecoin')].name | [0]" -o tsv)
          POSTGRES_SERVER=$(az postgres flexible-server list -g "$RG" --query "[?starts_with(name, 'homecoin')].name | [0]" -o tsv)

          echo "Container env: $CONTAINER_ENV"
          echo "PostgreSQL: $POSTGRES_SERVER"

          az deployment group create \
            --resource-group "$RG" \
            --name "homecoin-apps-$(date +%Y%m%d%H%M%S)" \
            --template-file infra/azure/apps.bicep \
            --parameters \
              acrName="${{ vars.AZURE_ACR_NAME }}" \
              containerEnvName="$CONTAINER_ENV" \
              postgresServerName="$POSTGRES_SERVER" \
              location="$RG_LOCATION" \
              postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
              jwtSecret="${{ secrets.JWT_SECRET }}" \
              superkitSecret="${{ secrets.SUPERKIT_SECRET }}" \
              workerInternalToken="${{ secrets.WORKER_INTERNAL_TOKEN }}" \
              imageTag="${{ steps.meta.outputs.tag }}" \
            --query properties.outputs \
            --output json > apps-outputs.json

          echo "fqdn=$(jq -r '.containerAppFqdn.value' apps-outputs.json)" >> "$GITHUB_OUTPUT"

      - name: Health check (HTTPS)
        run: |
          FQDN="${{ steps.apps.outputs.fqdn }}"

          echo "Waiting for https://${FQDN}/health ..."
          for i in $(seq 1 36); do
            if curl -sf "https://${FQDN}/health" | grep -q ok; then
              echo "Deployment healthy."
              exit 0
            fi
            sleep 10
          done

          echo "::error::Health check failed after deploy."
          exit 1
