events {
    worker_connections 1024;
}

http {
    # Docker embedded DNS — re-resolve upstream on each request
    resolver 127.0.0.11 valid=30s ipv6=off;

    upstream homecoin_api {
        server api:8080;
        keepalive 16;
    }

    # Redirect HTTP to HTTPS (except internal health probe on port 80)
    server {
        listen 80;
        server_name _;

        location = /health {
            access_log off;
            proxy_pass http://homecoin_api/health;
            proxy_http_version 1.1;
            proxy_set_header Host api;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # SSE — long-lived connections
        location ~ ^/api/v1/households/[^/]+/events$ {
            proxy_pass http://homecoin_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
            proxy_buffering off;
        }

        location / {
            proxy_pass http://homecoin_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
