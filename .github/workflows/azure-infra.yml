# Provision Azure infrastructure for HomeCoin (ACR, Container Apps, PostgreSQL).
#
# Run once per environment (or when infra changes), then use cd-azure.yml for app releases.
#
# Required repository secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   POSTGRES_ADMIN_PASSWORD  (min 8 chars, mixed case + numbers)
#   JWT_SECRET               (long random string)
#   SUPERKIT_SECRET          (32+ characters)
#   WORKER_INTERNAL_TOKEN    (shared API ↔ Worker auth token)
#
# Required repository variables:
#   AZURE_RESOURCE_GROUP
#   AZURE_LOCATION           e.g. uaenorth

name: Azure Infrastructure

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: Resource name prefix
        required: false
        default: homecoin
        type: string
      min_replicas:
        description: Container App minimum replicas (0 allows scale-to-zero)
        required: false
        default: "0"
        type: string
      max_replicas:
        description: Container App maximum replicas
        required: false
        default: "2"
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Bicep
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          echo "Deploying to region: ${{ vars.AZURE_LOCATION }}"
          az group create \
            --name "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --location "${{ vars.AZURE_LOCATION }}" \
            --output none

      - name: Register Azure resource providers
        run: |
          for ns in Microsoft.App Microsoft.ContainerRegistry Microsoft.DBforPostgreSQL Microsoft.OperationalInsights; do
            state=$(az provider show --namespace "$ns" --query registrationState -o tsv 2>/dev/null || echo "Unknown")
            echo "$ns: $state"
            if [ "$state" != "Registered" ]; then
              echo "Registering $ns ..."
              az provider register --namespace "$ns" --wait
            fi
          done

      - name: Deploy infrastructure
        id: deploy
        run: |
          DEPLOYMENT_NAME="homecoin-infra-$(date +%Y%m%d%H%M%S)"
          RG_LOCATION=$(az group show --name "${{ vars.AZURE_RESOURCE_GROUP }}" --query location -o tsv)
          echo "Resource group location: $RG_LOCATION"

          az deployment group create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "$DEPLOYMENT_NAME" \
            --template-file infra/azure/main.bicep \
            --parameters \
              appName="${{ inputs.app_name }}" \
              location="$RG_LOCATION" \
              postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
            --query properties.outputs \
            --output json > deployment-outputs.json

          echo "acr_name=$(jq -r '.acrName.value' deployment-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "container_app=$(jq -r '.containerAppName.value' deployment-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "worker_app=$(jq -r '.workerAppName.value' deployment-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "container_env=$(jq -r '.containerEnvName.value' deployment-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "postgres_server=$(jq -r '.postgresServerName.value' deployment-outputs.json)" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          {
            echo "### Azure infrastructure deployed"
            echo ""
            echo "| Setting | Value |"
            echo "|---------|-------|"
            echo "| Resource group | \`${{ vars.AZURE_RESOURCE_GROUP }}\` |"
            echo "| ACR name | \`${{ steps.deploy.outputs.acr_name }}\` |"
            echo "| Container Apps Environment | \`${{ steps.deploy.outputs.container_env }}\` |"
            echo "| API app name (for CD) | \`${{ steps.deploy.outputs.container_app }}\` |"
            echo "| Worker app name (for CD) | \`${{ steps.deploy.outputs.worker_app }}\` |"
            echo ""
            echo "Set variables \`AZURE_ACR_NAME\`, \`AZURE_CONTAINER_APP\`, \`AZURE_WORKER_APP\`, then run **CD — Azure** to deploy apps."
          } >> "$GITHUB_STEP_SUMMARY"
