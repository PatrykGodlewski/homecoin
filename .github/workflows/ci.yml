# CI pipeline: unit tests, lint, build, Docker validation, E2E tests.
#
# Jobs (left sidebar in GitHub Actions):
#   Unit tests  → go test ./...
#   Lint        → go vet
#   Build       → compile binaries
#   Docker build→ validate images
#   E2E tests   → docker compose + smoke_test.sh + go test -tags=e2e  ← wymagane na ocenę bdb
#
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate Templ
        run: templ generate ./internal/ui/views/...

      - name: Verify Templ output is committed
        run: |
          git diff --exit-code internal/ui/views/ || (
            echo "::error::Templ generated code is out of date. Run 'make templ' and commit the changes."
            exit 1
          )

      - name: Run unit tests
        run: go test ./... -count=1 -race

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Verify module graph
        run: go mod verify

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Build binaries
        run: |
          templ generate ./internal/ui/views/...
          CGO_ENABLED=0 go build -o bin/homecoin-api ./cmd/api
          CGO_ENABLED=0 go build -o bin/homecoin-worker ./cmd/worker

      - name: Upload API artifact
        uses: actions/upload-artifact@v6
        with:
          name: homecoin-api-linux-amd64
          path: bin/homecoin-api
          retention-days: 7

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: false
          load: true
          tags: homecoin-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: worker
          push: false
          load: true
          tags: homecoin-worker:ci
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [test, build]
    env:
      BASE_URL: https://127.0.0.1:8081
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate TLS certificates
        run: chmod +x deploy/nginx/generate-certs.sh && ./deploy/nginx/generate-certs.sh

      - name: Start stack (microservices + HTTPS)
        run: docker compose up -d --build --wait --wait-timeout 300

      - name: Verify stack healthy
        run: |
          docker compose ps
          for i in $(seq 1 30); do
            if curl -sk --max-time 5 --retry-connrefused --retry 3 --retry-delay 2 "$BASE_URL/health" | grep -q '"status":"ok"'; then
              echo "HTTPS health OK (attempt $i)"
              exit 0
            fi
            echo "waiting for $BASE_URL... ($i/30)"
            sleep 2
          done
          echo "HTTPS health check failed"
          curl -vk --max-time 5 "$BASE_URL/health" || true
          exit 1

      - name: E2E smoke test (bash)
        run: chmod +x scripts/smoke_test.sh && ./scripts/smoke_test.sh

      - name: Install Playwright (Chromium)
        run: |
          chmod +x scripts/install-playwright.sh
          PLAYWRIGHT_WITH_DEPS=1 ./scripts/install-playwright.sh

      - name: E2E tests (Go + Playwright)
        run: go test -tags=e2e,playwright ./test/e2e/... -count=1 -v

      - name: E2E debug on failure
        if: failure()
        run: |
          docker compose ps -a
          docker compose exec -T nginx wget -qO- http://127.0.0.1/health || true
          docker compose exec -T nginx wget -qO- http://api:8080/health || true
          docker compose logs api --tail 40
          docker compose logs worker --tail 20
          docker compose logs nginx --tail 40

      - name: E2E summary
        if: success()
        run: |
          {
            echo "### E2E tests passed"
            echo ""
            echo "| Test | Plik |"
            echo "|------|------|"
            echo "| Smoke (curl) | \`scripts/smoke_test.sh\` |"
            echo "| Go E2E API | \`test/e2e/api_test.go\` |"
            echo "| Go E2E UI (HTTP) | \`test/e2e/ui_test.go\` |"
            echo "| Go E2E UI (Playwright) | \`test/e2e/playwright_test.go\` |"
            echo ""
            echo "Stack: docker compose (api + worker + postgres + nginx HTTPS)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Tear down
        if: always()
        run: docker compose down -v
