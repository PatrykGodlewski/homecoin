name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate Templ
        run: templ generate ./internal/ui/views/...

      - name: Verify Templ output is committed
        run: |
          git diff --exit-code internal/ui/views/ || (
            echo "::error::Templ generated code is out of date. Run 'make templ' and commit the changes."
            exit 1
          )

      - name: Run unit tests
        run: go test ./... -count=1 -race

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Verify module graph
        run: go mod verify

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Build binaries
        run: |
          templ generate ./internal/ui/views/...
          CGO_ENABLED=0 go build -o bin/homecoin-api ./cmd/api
          CGO_ENABLED=0 go build -o bin/homecoin-worker ./cmd/worker

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: homecoin-api-linux-amd64
          path: bin/homecoin-api
          retention-days: 7

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: false
          load: true
          tags: homecoin-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: worker
          push: false
          load: true
          tags: homecoin-worker:ci
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [test, build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate TLS certificates
        run: chmod +x deploy/nginx/generate-certs.sh && ./deploy/nginx/generate-certs.sh

      - name: Start stack (microservices + HTTPS)
        run: docker compose up -d --build --wait

      - name: Smoke test (bash)
        run: ./scripts/smoke_test.sh

      - name: E2E tests (Go)
        env:
          BASE_URL: https://localhost:8081
        run: go test -tags=e2e ./test/e2e/... -count=1 -v

      - name: Tear down
        if: always()
        run: docker compose down -v
